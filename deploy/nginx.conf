# =============================================================================
# Конфигурация Nginx для irsi-app.ru
# Разместить: /etc/nginx/sites-available/irsi-app.ru
# Активировать: ln -s /etc/nginx/sites-available/irsi-app.ru /etc/nginx/sites-enabled/
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name irsi-app.ru www.irsi-app.ru;

    # Корневая директория Laravel
    root /var/www/irsi-app/public;

    # Индексный файл
    index index.php;

    # Максимальный размер загружаемых файлов
    client_max_body_size 20M;

    # Логи
    access_log /var/log/nginx/irsi-app-access.log;
    error_log /var/log/nginx/irsi-app-error.log;

    # Основной маршрут Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Обработка PHP-файлов через PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Запрет доступа к скрытым файлам (.env, .git и т.д.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Кэширование статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
